name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build public site
        shell: bash
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: |
          test -n "$SUPABASE_URL" || (echo "Missing repository variable SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_ANON_KEY" || (echo "Missing repository variable SUPABASE_ANON_KEY" && exit 1)
          mkdir -p _site
          cp index.html styles.css script.js cloud.js _site/
          printf 'window.__SUPABASE_CONFIG__ = %s;\n' "$(jq -nc --arg url "$SUPABASE_URL" --arg anon "$SUPABASE_ANON_KEY" '{url:$url,anonKey:$anon}')" > _site/config.js
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
